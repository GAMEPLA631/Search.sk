<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEPLA631 Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.appState = { supabase: null };

        function initSupabase() {
            const url = localStorage.getItem('sb_url');
            const key = localStorage.getItem('sb_key');
            if (url && key) {
                try {
                    window.appState.supabase = supabase.createClient(url, key);
                    document.getElementById('config-panel').classList.add('hidden');
                    checkAuth();
                } catch (e) { console.error("Chyba Supabase:", e); }
            }
        }

        async function checkAuth() {
            const { data } = await window.appState.supabase.auth.getSession();
            updateUI(data.session ? data.session.user : null);
        }

        async function loginWithGoogle() {
            const { error } = await window.appState.supabase.auth.signInWithOAuth({ provider: 'google' });
            if (error) alert("Chyba: " + error.message);
        }

        async function logout() {
            await window.appState.supabase.auth.signOut();
            updateUI(null);
        }

        function updateUI(user) {
            const btn = document.getElementById('login-btn');
            if (user) {
                btn.innerText = `Odhlásiť (${user.user_metadata.full_name || 'Užívateľ'})`;
                btn.onclick = logout;
            } else {
                btn.innerText = "Prihlásiť sa cez Google";
                btn.onclick = loginWithGoogle;
            }
        }

        function saveConfig() {
            localStorage.setItem('sb_url', document.getElementById('sb_url_in').value);
            localStorage.setItem('sb_key', document.getElementById('sb_key_in').value);
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('sb_url')) {
                document.getElementById('config-panel').classList.remove('hidden');
            } else {
                initSupabase();
            }
        });
    </script>
    <style>
        body { background-color: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Segoe UI', sans-serif; }
        .search-container { width: 100%; max-width: 700px; padding: 2px; border-radius: 50px; background: linear-gradient(to right, #4285f4, #ea4335, #fbbc05, #34a853); }
        .search-bar { background: #000; border-radius: 48px; padding: 15px 25px; display: flex; align-items: center; gap: 15px; }
        input { background: transparent; border: none; outline: none; width: 100%; color: white; font-size: 1.1rem; }
        .config-panel { position: fixed; bottom: 20px; left: 20px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .icon-btn { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; }
        .ai-mode { border: 1px solid #444; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div id="config-panel" class="config-panel hidden z-50">
        <h3 class="mb-2 text-sm">Supabase Konfigurácia</h3>
        <input id="sb_url_in" type="text" placeholder="Supabase URL" class="mb-2 w-full p-2 bg-black border border-gray-700 rounded">
        <input id="sb_key_in" type="password" placeholder="Supabase API Key" class="mb-4 w-full p-2 bg-black border border-gray-700 rounded">
        <button onclick="saveConfig()" class="w-full bg-blue-600 py-2 rounded">Uložiť a pripojiť</button>
    </div>

    <div class="text-center w-full px-6">
        <button id="login-btn" class="absolute top-5 right-5 px-4 py-2 bg-gray-800 rounded-full hover:bg-gray-700 transition">Pripájam...</button>
        <h1 class="text-6xl font-medium mb-12 tracking-tight text-gray-200">GAMEPLA631</h1>
        
        <div class="search-container mx-auto">
            <div class="search-bar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="opacity-50">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search" placeholder="Hľadať..." onkeypress="handleEnter(event)">
                <div class="flex items-center gap-4 ml-auto">
                    <span class="icon-btn">🎤</span>
                    <span class="icon-btn">📸</span>
                    <div class="ai-mode">✨ AI Mode</div>
                </div>
            </div>
        </div>

        <div class="flex justify-center gap-6 mt-10">
            <button onclick="setEngine('google')" id="btn-google" class="px-6 py-2 rounded-full border border-gray-700 hover:border-gray-500 transition">Google</button>
            <button onclick="setEngine('youtube')" id="btn-youtube" class="px-6 py-2 rounded-full border border-gray-700 hover:border-gray-500 transition">YouTube</button>
        </div>
    </div>

    <script>
        let currentEngine = 'google';
        function setEngine(engine) {
            currentEngine = engine;
            document.getElementById('btn-google').style.background = engine === 'google' ? '#333' : 'transparent';
            document.getElementById('btn-youtube').style.background = engine === 'youtube' ? '#333' : 'transparent';
        }
        function handleEnter(e) { if (e.key === 'Enter') performSearch(); }
        function performSearch() {
            const query = document.getElementById('search').value;
            if (!query) return;
            const url = currentEngine === 'google' 
                ? `https://www.google.com/search?q=${encodeURIComponent(query)}` 
                : `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
